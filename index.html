  <!-- 🔴 PASTE GTM BODY SCRIPT HERE -->

<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WT8DBJXZ"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

  <h1>Lead Generation Form</h1>

  <form id="leadForm">
    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>Phone Number:</label>
    <input type="tel" id="phone" required>

    <label>Age:</label>
    <input type="number" id="age" required>

    <label>City:</label>
    <select id="city" required>
      <option value="">Select City</option>
      <option>Mumbai</option>
      <option>Bangalore</option>
      <option>Delhi</option>
      <option>Pune</option>
    </select>

    <button type="submit">Submit</button>
  </form>

  <p id="message"></p>

  <!-- ✅ Lead Submission Script -->
  <script>
    document.getElementById("leadForm").addEventListener("submit", function(e) {
      e.preventDefault();

      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let phone = document.getElementById("phone").value;
      let age = document.getElementById("age").value;
      let city = document.getElementById("city").value;

      // Push to DataLayer
      window.dataLayer = window.dataLayer || [];
      dataLayer.push({
        event: "lead_submit",
        user_name: name,
        user_email: email,
        user_phone: phone,
        user_age: age,
        user_city: city
      });

      document.getElementById("message").innerText = "Form submitted successfully!";
    });
  </script>

  <!-- 🍪 Consent Banner -->
  <div id="banner" style="position:fixed;bottom:0;background:#000;color:#fff;padding:10px;width:100%;">
    This site uses cookies. Accept?
    <button onclick="acceptConsent()">Accept</button>
  </div>

  <script>
function acceptConsent() {
  window.dataLayer = window.dataLayer || [];
  dataLayer.push({
    event: "consent_update",
    analytics_storage: "granted",
    ad_storage: "granted",
    ad_user_data: "granted",
    ad_personalization: "granted"
  });

  document.getElementById("banner").style.display = "none";
}
</script>

</body>
</html>
